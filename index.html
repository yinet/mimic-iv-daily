<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIMIC-IV 重症文献日报</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #0d1117; color: #e6edf3; line-height: 1.7; padding: 2rem; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { text-align: center; font-size: 2rem; color: #58a6ff; margin-bottom: 0.4rem; }
  .subtitle { text-align: center; color: #8b949e; font-size: 0.85rem; margin-bottom: 2.5rem; }
  .subtitle span { background: #21262d; padding: 2px 10px; border-radius: 4px; margin: 0 4px; }
  .section-title { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin: 2rem 0 0.8rem 0; padding-left: 0.5rem; border-left: 3px solid #30363d; }
  .paper-link { display: flex; align-items: center; justify-content: space-between; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem 1.2rem; margin-bottom: 0.7rem; text-decoration: none; transition: border-color 0.2s, background 0.2s; }
  .paper-link:hover { border-color: #58a6ff; background: #1c2128; }
  .paper-link-left { flex: 1; }
  .paper-date { font-size: 0.8rem; color: #8b949e; margin-bottom: 0.2rem; }
  .paper-label { font-size: 1rem; color: #79c0ff; font-weight: 600; }
  .paper-count { font-size: 0.75rem; color: #3fb950; background: #1c2128; padding: 3px 10px; border-radius: 20px; border: 1px solid #30363d; white-space: nowrap; }
  .paper-link:hover .paper-count { border-color: #3fb950; }
  .footer { text-align: center; color: #484f58; font-size: 0.75rem; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #21262d; }
  .footer a { color: #58a6ff; text-decoration: none; }
  .status { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #3fb950; background: #1c2128; padding: 4px 12px; border-radius: 20px; border: 1px solid #30363d; margin-bottom: 1.5rem; }
  .status::before { content: ''; width: 7px; height: 7px; background: #3fb950; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>

<div class="container">

  </div>

  </div>

  <div class="section-title">日报归档</div>

  <a class="paper-link" href="https://litter.catbox.moe/xziq9m.html" target="_blank">

      <div class="paper-date">2026 年 4 月 4 日 · 周六</div>
